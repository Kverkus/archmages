<?xml version="1.0" encoding="UTF-8"?>
<svg width="360" height="110" viewBox="0 0 360 110" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Archmages Logo</title>
  <defs>
    <linearGradient id="archmages-fill" x1="180" x2="180" y1="14" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff5a8" offset="0" />
      <stop stop-color="#f5d76b" offset="0.15" />
      <stop stop-color="#32d6b4" offset="0.42" />
      <stop stop-color="#079878" offset="0.74" />
      <stop stop-color="#044e55" offset="1" />
    </linearGradient>
    <linearGradient id="archmages-bevel" x1="180" x2="180" y1="12" y2="86" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fffbd0" offset="0" />
      <stop stop-color="#e6c650" offset="0.38" />
      <stop stop-color="#846124" offset="1" />
    </linearGradient>
    <linearGradient id="archmages-glint" x1="38" x2="322" y1="26" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff8bf" stop-opacity="0" offset="0" />
      <stop stop-color="#fff8bf" stop-opacity="0.9" offset="0.22" />
      <stop stop-color="#fff8bf" stop-opacity="0.2" offset="0.5" />
      <stop stop-color="#fff8bf" stop-opacity="0.75" offset="0.78" />
      <stop stop-color="#fff8bf" stop-opacity="0" offset="1" />
    </linearGradient>
    <filter id="archmages-shadow" x="-12%" y="-20%" width="124%" height="150%">
      <feDropShadow dx="4" dy="7" stdDeviation="2.5" flood-color="#02131d" flood-opacity="0.95" />
      <feDropShadow dx="-2" dy="3" stdDeviation="1.4" flood-color="#062c3d" flood-opacity="0.8" />
    </filter>
    <filter id="archmages-glow" x="-8%" y="-18%" width="116%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feColorMatrix in="blur" result="tealGlow" values="0 0 0 0 0.05  0 0 0 0 0.7  0 0 0 0 0.65  0 0 0 0.7 0" />
      <feMerge>
        <feMergeNode in="tealGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .word {
        font-family: "Cinzel Decorative", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        font-size: 63px;
        font-weight: 800;
        letter-spacing: 0;
      }
    </style>
  </defs>
  <g filter="url(#archmages-shadow)">
    <text class="word" x="180" y="74" text-anchor="middle" textLength="318" lengthAdjust="spacingAndGlyphs" fill="#041827" stroke="#06121b" stroke-width="11" paint-order="stroke fill">Archmages</text>
    <text class="word" x="180" y="74" text-anchor="middle" textLength="318" lengthAdjust="spacingAndGlyphs" fill="url(#archmages-fill)" stroke="url(#archmages-bevel)" stroke-width="5" paint-order="stroke fill">Archmages</text>
  </g>
  <g filter="url(#archmages-glow)">
    <text class="word" x="180" y="74" text-anchor="middle" textLength="318" lengthAdjust="spacingAndGlyphs" fill="none" stroke="#fff2a2" stroke-width="1.15" opacity="0.92">Archmages</text>
    <text class="word" x="180" y="74" text-anchor="middle" textLength="318" lengthAdjust="spacingAndGlyphs" fill="url(#archmages-glint)" opacity="0.55">Archmages</text>
    <path d="M37 78 C92 91, 263 92, 323 76" fill="none" stroke="#0d2d3e" stroke-width="5" stroke-linecap="round" opacity="0.65" />
    <path d="M46 79 C103 88, 251 88, 314 76" fill="none" stroke="#0fd6b2" stroke-width="1.3" stroke-linecap="round" opacity="0.55" />
  </g>
</svg>
